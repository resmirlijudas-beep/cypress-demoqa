name: Cypress CI Pipeline

on:
  push:
    branches: [master]
  pull_request:

jobs:
  cypress-run:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Setup Node.js (with npm cache enabled)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18.18
          cache: 'npm'

      # Step 3: Install dependencies
      - name: Install Dependencies
        run: npm ci

      # Step 4: Install Cypress binary
      - name: Install Cypress
        run: npx cypress install

      # Step 5: Run Cypress Tests
      - name: Run Cypress Tests
        run: npx cypress run

      # Step 6: Upload Screenshots (on failure)
      - name: Upload Screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: cypress/screenshots

      # Step 7: Upload Videos (always)
      - name: Upload Videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-videos
          path: cypress/videos